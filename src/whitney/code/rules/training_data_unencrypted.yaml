rules:
  - id: code-training-data-http
    patterns:
      - pattern-either:
          - pattern: pd.read_csv("http://...")
          - pattern: pd.read_csv('http://...')
          - pattern: requests.get("http://...")
          - pattern: requests.get('http://...')
          - pattern: urllib.request.urlopen("http://...")
          - pattern: urllib.request.urlopen('http://...')
          - pattern: httpx.get("http://...")
          - pattern: httpx.get('http://...')
    message: >
      Data fetched over unencrypted HTTP. Use HTTPS for data in transit.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-training-data-unencrypted
      whitney_severity: medium
      cwe: ["CWE-319"]
      owasp: []
      confidence: HIGH
      category: security
      technology: [pandas, requests]
      references:
        - https://cwe.mitre.org/data/definitions/319.html
      soc2_controls: ["CC6.1", "CC6.7"]
      remediation: "Use HTTPS for remote data. Encrypt training data at rest."
