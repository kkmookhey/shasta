rules:
  # --- LangChain / generic vector store ---
  - id: code-rag-no-access-control-similarity-search
    patterns:
      - pattern-either:
          - pattern: $STORE.similarity_search($QUERY)
          - pattern: $STORE.similarity_search($QUERY, ...)
          - pattern: $STORE.similarity_search_with_score($QUERY)
          - pattern: $STORE.similarity_search_with_score($QUERY, ...)
          - pattern: $STORE.as_retriever()
          - pattern: $STORE.as_retriever(...)
      - pattern-not: $STORE.similarity_search($QUERY, ..., filter=..., ...)
      - pattern-not: $STORE.similarity_search($QUERY, ..., where=..., ...)
      - pattern-not: $STORE.similarity_search($QUERY, ..., namespace=..., ...)
      - pattern-not: $STORE.similarity_search_with_score($QUERY, ..., filter=..., ...)
      - pattern-not: $STORE.as_retriever(..., search_kwargs=..., ...)
    message: >
      Vector store query without access control filtering.
      Add user-level or tenant-level metadata filters to prevent cross-tenant
      data access in RAG pipelines.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-rag-no-access-control
      whitney_severity: medium
      cwe: ["CWE-862"]
      owasp: ["LLM08:2025"]
      confidence: MEDIUM
      category: security
      technology: [langchain]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC6.3"]
      remediation: "Add user-level or tenant-level metadata filters to vector DB queries to prevent cross-tenant data access."

  # --- Pinecone ---
  - id: code-rag-no-access-control-pinecone
    patterns:
      - pattern-either:
          - pattern: $INDEX.query(vector=$VEC, ...)
          - pattern: $INDEX.query($VEC, ...)
      - pattern-not: $INDEX.query(..., filter=..., ...)
      - pattern-not: $INDEX.query(..., namespace=..., ...)
    message: >
      Pinecone query without filter or namespace. Add metadata filters to
      enforce tenant isolation.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-rag-no-access-control
      whitney_severity: medium
      cwe: ["CWE-862"]
      owasp: ["LLM08:2025"]
      confidence: MEDIUM
      category: security
      technology: [pinecone]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC6.3"]
      remediation: "Add filter= or namespace= to Pinecone queries for tenant isolation."

  # --- Chroma ---
  - id: code-rag-no-access-control-chroma
    patterns:
      - pattern-either:
          - pattern: $COLLECTION.query(query_texts=$Q)
          - pattern: $COLLECTION.query(query_texts=$Q, ...)
          - pattern: $COLLECTION.query(query_embeddings=$Q)
          - pattern: $COLLECTION.query(query_embeddings=$Q, ...)
      - pattern-not: $COLLECTION.query(..., where=..., ...)
      - pattern-not: $COLLECTION.query(..., where_document=..., ...)
    message: >
      Chroma query without where filter. Add metadata filters to enforce
      tenant isolation.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-rag-no-access-control
      whitney_severity: medium
      cwe: ["CWE-862"]
      owasp: ["LLM08:2025"]
      confidence: MEDIUM
      category: security
      technology: [chroma]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC6.3"]
      remediation: "Add where= filter to Chroma queries for tenant isolation."

  # --- Qdrant ---
  - id: code-rag-no-access-control-qdrant
    patterns:
      - pattern-either:
          - pattern: $CLIENT.search(collection_name=$C, query_vector=$V)
          - pattern: $CLIENT.search(collection_name=$C, query_vector=$V, ...)
          - pattern: $CLIENT.query_points(collection_name=$C, ...)
      - pattern-not: $CLIENT.search(..., query_filter=..., ...)
      - pattern-not: $CLIENT.query_points(..., query_filter=..., ...)
    message: >
      Qdrant search without query_filter. Add filters to enforce tenant isolation.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-rag-no-access-control
      whitney_severity: medium
      cwe: ["CWE-862"]
      owasp: ["LLM08:2025"]
      confidence: MEDIUM
      category: security
      technology: [qdrant]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC6.3"]
      remediation: "Add query_filter= to Qdrant searches for tenant isolation."

  # --- Weaviate ---
  - id: code-rag-no-access-control-weaviate
    patterns:
      - pattern-either:
          - pattern: $COLLECTION.query.near_text(query=$Q)
          - pattern: $COLLECTION.query.near_text(query=$Q, ...)
          - pattern: $COLLECTION.query.near_vector(near_vector=$V)
          - pattern: $COLLECTION.query.near_vector(near_vector=$V, ...)
      - pattern-not: $COLLECTION.query.near_text(..., filters=..., ...)
      - pattern-not: $COLLECTION.query.near_vector(..., filters=..., ...)
    message: >
      Weaviate query without filters. Add filters to enforce tenant isolation.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-rag-no-access-control
      whitney_severity: medium
      cwe: ["CWE-862"]
      owasp: ["LLM08:2025"]
      confidence: MEDIUM
      category: security
      technology: [weaviate]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC6.3"]
      remediation: "Add filters= to Weaviate queries for tenant isolation."
