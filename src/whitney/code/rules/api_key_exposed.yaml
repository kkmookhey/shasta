rules:
  - id: code-ai-api-key-exposed-openai
    pattern-regex: (?:api_key|OPENAI_API_KEY|API_KEY)\s*=\s*["']sk-[a-zA-Z0-9_\-]{20,}["']
    message: >
      OpenAI API key hardcoded in source code.
      Move to environment variable or secrets manager. Rotate the exposed key immediately.
    severity: ERROR
    languages: [python, javascript, typescript]
    paths:
      exclude:
        - "**/test*"
        - "**/README*"
        - "**/docs/**"
    metadata:
      check_id: code-ai-api-key-exposed
      whitney_severity: critical
      cwe: ["CWE-798"]
      owasp: ["LLM06:2025"]
      confidence: HIGH
      category: security
      technology: [openai]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      soc2_controls: ["CC6.1"]
      remediation: "Move the key to an environment variable or secrets manager. Rotate the exposed key immediately."

