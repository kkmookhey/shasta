rules:
  - id: code-ai-key-in-env-file
    patterns:
      - pattern-regex: ^(?:OPENAI_API_KEY|ANTHROPIC_API_KEY|HUGGINGFACE_TOKEN|COHERE_API_KEY|AZURE_OPENAI_KEY|AI_API_KEY|REPLICATE_API_TOKEN|GOOGLE_API_KEY|GEMINI_API_KEY|MISTRAL_API_KEY|GROQ_API_KEY)\s*=\s*.+
    message: >
      AI API key found in .env file. Add .env to .gitignore.
      Use a secrets manager for production deployments.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "*.env"
        - ".env"
        - ".env.local"
        - ".env.production"
        - ".env.development"
        - ".env.staging"
        - ".env.test"
      exclude:
        - "*.env.example"
        - "*.env.sample"
        - "*.env.template"
    metadata:
      check_id: code-ai-key-in-env-file
      whitney_severity: critical
      cwe: ["CWE-798"]
      owasp: ["LLM06:2025"]
      confidence: HIGH
      category: security
      technology: [dotenv]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      soc2_controls: ["CC6.1"]
      remediation: "Add .env to .gitignore. Use a secrets manager for production deployments."
