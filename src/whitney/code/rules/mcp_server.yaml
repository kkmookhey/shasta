rules:
  # --- MCP tool with dangerous shell/exec operations ---
  - id: code-mcp-tool-scope-server-tool-exec
    patterns:
      - pattern-inside: |
          @$SERVER.tool(...)
          def $FUNC(...):
              ...
      - pattern-either:
          - pattern: exec(...)
          - pattern: eval(...)
          - pattern: subprocess.run(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.Popen(...)
          - pattern: subprocess.check_output(...)
          - pattern: os.system(...)
          - pattern: os.popen(...)
    message: >
      MCP tool function includes shell execution or eval. A prompt injection
      attack could cause the LLM to invoke this tool with attacker-controlled
      arguments, achieving remote code execution.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-mcp-tool-scope
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Remove shell execution from MCP tools. Use allowlisted commands with validated inputs. Sandbox dangerous operations."

  # --- MCP tool with filesystem write ---
  - id: code-mcp-tool-scope-server-tool-filewrite
    patterns:
      - pattern-inside: |
          @$SERVER.tool(...)
          def $FUNC(...):
              ...
      - pattern-either:
          - pattern: open($PATH, "w")
          - pattern: open($PATH, "w", ...)
          - pattern: open($PATH, "a")
          - pattern: open($PATH, "a", ...)
          - pattern: shutil.rmtree(...)
          - pattern: shutil.move(...)
          - pattern: os.remove(...)
          - pattern: os.unlink(...)
          - pattern: Path(...).write_text(...)
          - pattern: Path(...).unlink(...)
    message: >
      MCP tool function includes filesystem write or delete operations.
      An attacker could leverage this via prompt injection to modify or
      delete files on the server.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-mcp-tool-scope
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Restrict MCP tools to read-only file access. Validate and allowlist paths. Use a sandboxed directory."

  # --- MCP tool with SQL write operations ---
  - id: code-mcp-tool-scope-server-tool-sql
    patterns:
      - pattern-inside: |
          @$SERVER.tool(...)
          def $FUNC(...):
              ...
      - pattern-either:
          - pattern: $CURSOR.execute(f"...{$INPUT}...")
          - pattern: $CURSOR.execute("..." + $INPUT)
          - pattern: $CURSOR.execute($QUERY.format(...))
    message: >
      MCP tool function constructs SQL queries via string interpolation.
      This enables SQL injection if the LLM passes attacker-controlled
      input to the tool.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-mcp-tool-scope
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Use parameterised queries (cursor.execute(sql, params)). Never interpolate tool inputs into SQL strings."

  # --- MCP tool with untyped **kwargs ---
  - id: code-mcp-input-validation-kwargs
    patterns:
      - pattern-inside: |
          @$SERVER.tool(...)
          def $FUNC(**$KWARGS):
              ...
    message: >
      MCP tool function accepts **kwargs without a typed schema. Unvalidated
      inputs from the LLM can be exploited for injection. Define explicit
      typed parameters or a Pydantic model.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-mcp-input-validation
      whitney_severity: medium
      soc2_controls: ["CC6.1"]
      remediation: "Define typed input parameters for MCP tools using Pydantic models or explicit function signatures."

  # --- MCP tool with untyped *args ---
  - id: code-mcp-input-validation-args
    patterns:
      - pattern-inside: |
          @$SERVER.tool(...)
          def $FUNC(*$ARGS):
              ...
    message: >
      MCP tool function accepts *args without a typed schema. Define
      explicit typed parameters.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-mcp-input-validation
      whitney_severity: medium
      soc2_controls: ["CC6.1"]
      remediation: "Define typed input parameters for MCP tools using explicit function signatures."
