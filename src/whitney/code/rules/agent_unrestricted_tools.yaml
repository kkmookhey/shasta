rules:
  - id: code-agent-unrestricted-tools-tool-class
    patterns:
      - pattern-inside: Tool(...)
      - pattern-either:
          - pattern: exec(...)
          - pattern: eval(...)
          - pattern: subprocess.run(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.Popen(...)
          - pattern: os.system(...)
    message: >
      AI agent Tool definition includes dangerous operations (exec, eval,
      subprocess, os.system). Restrict agent tool capabilities with allowlists
      and sandboxing.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-agent-unrestricted-tools
      whitney_severity: high
      cwe: ["CWE-78"]
      owasp: ["LLM08:2025"]
      confidence: HIGH
      category: security
      technology: [langchain]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Restrict agent tool capabilities. Use allowlists, sandboxing, and human-in-the-loop for dangerous operations."

  - id: code-agent-unrestricted-tools-decorator
    patterns:
      - pattern-inside: |
          @tool
          def $FUNC(...):
              ...
      - pattern-either:
          - pattern: exec(...)
          - pattern: eval(...)
          - pattern: subprocess.run(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.Popen(...)
          - pattern: os.system(...)
    message: >
      AI agent @tool function includes dangerous operations.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-agent-unrestricted-tools
      whitney_severity: high
      cwe: ["CWE-78"]
      owasp: ["LLM08:2025"]
      confidence: HIGH
      category: security
      technology: [langchain]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Restrict agent tool capabilities. Use allowlists, sandboxing, and human-in-the-loop for dangerous operations."

  - id: code-agent-unrestricted-tools-structured
    patterns:
      - pattern-inside: StructuredTool(...)
      - pattern-either:
          - pattern: exec(...)
          - pattern: eval(...)
          - pattern: subprocess.run(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.Popen(...)
          - pattern: os.system(...)
    message: >
      AI agent StructuredTool includes dangerous operations.
    severity: WARNING
    languages: [python]
