rules:
  # --- System prompt in route handler (Python) ---
  - id: code-meta-prompt-exposed-flask-route
    patterns:
      - pattern-inside: |
          @$APP.$METHOD(...)
          def $FUNC(...):
              ...
      - pattern-regex: "['\"](?:You are (?:a |an |the )|Your role is|Your task is to|you must (?:always |never ))"
    message: >
      System prompt with instructional language found inside a route handler.
      Users may extract the prompt via the API. Store system prompts in
      environment variables or a config service.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
        - "**/README*"
        - "**/docs/**"
    metadata:
      check_id: code-meta-prompt-exposed
      whitney_severity: medium
      soc2_controls: ["CC6.1"]
      cwe: ["CWE-200"]
      owasp: ["LLM07:2025"]
      confidence: MEDIUM
      category: security
      technology: [flask]
      references: ["https://owasp.org/www-project-top-10-for-large-language-model-applications/"]
      remediation: "Store system prompts in environment variables or a config service, not inline in route handlers."

  # --- System prompt assigned to variable (Python) ---
  - id: code-meta-prompt-exposed-variable-assignment
    patterns:
      - pattern-either:
          - pattern: $PROMPT = "..."
          - pattern: $PROMPT = f"..."
          - pattern: $PROMPT = '''...'''
          - pattern: $PROMPT = """..."""
          - pattern: $PROMPT = textwrap.dedent(...)
      - metavariable-regex:
          metavariable: $PROMPT
          regex: "(?i)(system_prompt|SYSTEM_PROMPT|system_message|SYSTEM_MESSAGE|sys_prompt|SYS_PROMPT|instructions|INSTRUCTIONS)"
    message: >
      System prompt assigned to a variable with a recognisable name
      (system_prompt, instructions, etc.). Ensure this is not exposed to
      clients or logged in plaintext.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
        - "**/README*"
        - "**/docs/**"
    metadata:
      check_id: code-meta-prompt-exposed
      whitney_severity: medium
      soc2_controls: ["CC6.1"]
      cwe: ["CWE-200"]
      owasp: ["LLM07:2025"]
      confidence: MEDIUM
      category: security
      technology: [python]
      references: ["https://owasp.org/www-project-top-10-for-large-language-model-applications/"]
      remediation: "Store system prompts in environment variables or a config service. Do not expose to clients."

  # --- System prompt in JavaScript/TypeScript ---
  - id: code-meta-prompt-exposed-js
    patterns:
      - pattern-either:
          - pattern: |
              { role: "system", content: $CONTENT }
          - pattern: |
              { "role": "system", "content": $CONTENT }
    message: >
      System prompt found in a message object with role "system". Ensure
      this is not exposed to clients or logged in plaintext.
    severity: WARNING
    languages: [javascript, typescript]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
        - "**/README*"
        - "**/docs/**"
        - "**/node_modules/**"
    metadata:
      check_id: code-meta-prompt-exposed
      whitney_severity: medium
      soc2_controls: ["CC6.1"]
      cwe: ["CWE-200"]
      owasp: ["LLM07:2025"]
      confidence: MEDIUM
      category: security
      technology: [javascript, typescript]
      references: ["https://owasp.org/www-project-top-10-for-large-language-model-applications/"]
      remediation: "Store system prompts in environment variables or a config service."
