rules:
  # ===================================================================
  # Unsafe deserialization of model files — RCE via malicious models
  # ===================================================================
  # Based on Trail of Bits research (CWE-502).
  # A malicious .pkl, .pt, or .npy file can execute arbitrary code
  # when loaded. This is the primary supply chain attack vector for
  # ML models distributed via Hugging Face, PyTorch Hub, etc.

  # --- pickle (stdlib) ---
  - id: code-unsafe-deserialization-pickle
    patterns:
      - pattern-either:
          - pattern: pickle.load(...)
          - pattern: pickle.loads(...)
          - pattern: _pickle.load(...)
          - pattern: _pickle.loads(...)
          - pattern: cPickle.load(...)
          - pattern: cPickle.loads(...)
          - pattern: shelve.open(...)
    message: >
      Unsafe pickle deserialization. pickle.load() can execute arbitrary
      code when loading untrusted data. A malicious pickle file can
      achieve remote code execution on the loading machine.
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: critical
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Use json, safetensors, or ONNX formats instead of pickle.
        If pickle is unavoidable, use fickling to audit the pickle
        file before loading, or restrict with RestrictedUnpickler.

  # --- PyTorch ---
  - id: code-unsafe-deserialization-torch-load
    patterns:
      - pattern: torch.load(...)
      - pattern-not: torch.load(..., weights_only=True, ...)
      - pattern-not: torch.load(..., map_location=..., weights_only=True, ...)
    message: >
      torch.load() without weights_only=True uses pickle internally and
      can execute arbitrary code from a malicious .pt/.pth file. Malicious
      models distributed via Hugging Face or PyTorch Hub can exploit this.
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: critical
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Use torch.load(..., weights_only=True) to prevent code execution.
        Or migrate to safetensors format: model.save_pretrained() with
        safe_serialization=True. For untrusted models, use fickling to
        audit the file first.

  # --- PyTorch state_dict save (safe pattern — no alert) is excluded ---
  # torch.save(model.state_dict(), ...) is safe because it only saves
  # tensor data, not executable code. We only flag torch.load without
  # weights_only=True.

  # --- NumPy ---
  - id: code-unsafe-deserialization-numpy-load
    patterns:
      - pattern: numpy.load(..., allow_pickle=True, ...)
    message: >
      numpy.load() with allow_pickle=True can execute arbitrary code
      from a malicious .npy/.npz file. NumPy disabled pickle by default
      in v1.16.3 — re-enabling it reintroduces the risk.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Remove allow_pickle=True. If pickle is needed, validate the
        file source and consider safetensors or JSON alternatives.

  # --- Joblib (scikit-learn) ---
  - id: code-unsafe-deserialization-joblib
    patterns:
      - pattern-either:
          - pattern: joblib.load(...)
          - pattern: sklearn.externals.joblib.load(...)
    message: >
      joblib.load() uses pickle internally and can execute arbitrary code
      from malicious .joblib/.pkl files. Scikit-learn models saved with
      joblib are not safe to load from untrusted sources.
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Only load joblib files from trusted sources. Consider ONNX export
        for production model serving. Use skops.io for safer serialization.

  # --- TensorFlow/Keras ---
  - id: code-unsafe-deserialization-keras
    patterns:
      - pattern-either:
          - pattern: keras.models.load_model(...)
          - pattern: tf.keras.models.load_model(...)
          - pattern: tf.saved_model.load(...)
      - pattern-not: keras.models.load_model(..., safe_mode=True, ...)
      - pattern-not: tf.keras.models.load_model(..., safe_mode=True, ...)
    message: >
      Keras/TensorFlow model loading can execute arbitrary code through
      custom Lambda layers or custom objects. Use safe_mode=True in Keras 3
      or validate the model source.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Use safe_mode=True when loading Keras models. Validate model
        source. Consider ONNX or TFLite for production serving.

  # --- YAML (used in ML configs) ---
  - id: code-unsafe-deserialization-yaml
    patterns:
      - pattern: yaml.load($DATA)
      - pattern-not: yaml.load($DATA, Loader=yaml.SafeLoader)
      - pattern-not: yaml.load($DATA, Loader=yaml.CSafeLoader)
      - pattern-not: yaml.safe_load($DATA)
    message: >
      yaml.load() without SafeLoader can execute arbitrary Python code.
      ML config files (model cards, training configs, pipeline definitions)
      loaded with yaml.load() from untrusted sources are an RCE vector.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-unsafe-deserialization
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader).
        Never use yaml.load() with the default FullLoader on untrusted data.

  # --- Safetensors (GOOD — informational, shows safe alternative) ---
  # We intentionally do NOT flag safetensors.load_file() or
  # model.save_pretrained(..., safe_serialization=True) — these are
  # the recommended safe alternatives.
