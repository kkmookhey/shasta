rules:
  # ===================================================================
  # Missing token/cost limits on LLM API calls
  # ===================================================================
  # LLM API calls without max_tokens can consume unbounded tokens,
  # leading to unexpected costs. This is especially dangerous when
  # user input controls the prompt length or when agents run in loops.

  # --- OpenAI without max_tokens ---
  - id: code-token-limit-missing-openai
    patterns:
      - pattern: $CLIENT.chat.completions.create(...)
      - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$N, ...)
      - pattern-not: $CLIENT.chat.completions.create(..., max_completion_tokens=$N, ...)
    message: >
      OpenAI API call without max_tokens or max_completion_tokens limit.
      Unbounded token generation can lead to unexpected costs, especially
      when processing user-controlled input or in agent loops.
    severity: INFO
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-token-limit-missing
      whitney_severity: medium
      cwe: ["CWE-770"]
      owasp: []
      confidence: MEDIUM
      category: best-practice
      technology: [openai]
      references:
        - https://platform.openai.com/docs/api-reference/chat/create
      soc2_controls: ["CC7.2"]
      remediation: >
        Set max_tokens or max_completion_tokens to a reasonable limit.
        Consider the use case — summarization may need 500, generation
        may need 4096. Always set a ceiling.

  # --- Anthropic without max_tokens ---
  - id: code-token-limit-missing-anthropic
    patterns:
      - pattern: $CLIENT.messages.create(...)
      - pattern-not: $CLIENT.messages.create(..., max_tokens=$N, ...)
    message: >
      Anthropic API call without max_tokens limit. Note: Anthropic
      requires max_tokens, so this may indicate the call will fail
      at runtime. Always set an explicit token limit.
    severity: INFO
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-token-limit-missing
      whitney_severity: low
      cwe: ["CWE-770"]
      owasp: []
      confidence: HIGH
      category: best-practice
      technology: [anthropic]
      references:
        - https://docs.anthropic.com/en/api/messages
      soc2_controls: ["CC7.2"]
      remediation: >
        Set max_tokens to a reasonable limit. Anthropic requires this
        parameter — omitting it will cause an API error.

  # --- OpenAI JS/TS without max_tokens ---
  - id: code-token-limit-missing-openai-js
    patterns:
      - pattern: |
          $CLIENT.chat.completions.create({...})
      - pattern-not: |
          $CLIENT.chat.completions.create({..., max_tokens: $N, ...})
      - pattern-not: |
          $CLIENT.chat.completions.create({..., max_completion_tokens: $N, ...})
    message: >
      OpenAI API call without max_tokens limit.
    severity: INFO
    languages: [javascript, typescript]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
        - "**/node_modules/**"
    metadata:
      check_id: code-token-limit-missing
      whitney_severity: medium
      cwe: ["CWE-770"]
      owasp: []
      confidence: MEDIUM
      category: best-practice
      technology: [openai]
      references:
        - https://platform.openai.com/docs/api-reference/chat/create
      soc2_controls: ["CC7.2"]
      remediation: "Set max_tokens to a reasonable limit for your use case."
