rules:
  # ===================================================================
  # AI safety guardrails explicitly disabled
  # ===================================================================
  # Detects patterns where content filtering or safety settings are
  # intentionally weakened or disabled. While sometimes needed for
  # legitimate use cases, this should be flagged for review.

  # --- OpenAI moderation bypass ---
  - id: code-guardrails-disabled-openai-moderation-skip
    patterns:
      - pattern-either:
          - pattern: |
              $CLIENT.chat.completions.create(..., messages=$MSGS, ...)
      - pattern-not-inside: |
          $CLIENT.moderations.create(...)
          ...
      - pattern-not-inside: |
          ...
          $CLIENT.moderations.create(...)
    message: >
      OpenAI API call without a corresponding moderation check. Consider
      using the Moderations API to filter harmful content before or after
      LLM calls, especially for user-facing applications.
    severity: INFO
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-guardrails-disabled
      whitney_severity: low
      cwe: ["CWE-20"]
      owasp: ["LLM02:2025"]
      confidence: LOW
      category: best-practice
      technology: [openai]
      references:
        - https://platform.openai.com/docs/guides/moderation
      soc2_controls: ["CC7.2"]
      remediation: >
        Add OpenAI Moderation API checks for user-facing applications.
        Filter inputs before sending to the LLM and outputs before
        showing to users.

  # --- Gemini safety settings disabled ---
  - id: code-guardrails-disabled-gemini-safety-off
    patterns:
      - pattern-either:
          - pattern: |
              SafetySetting(..., threshold=$T, ...)
          - pattern: |
              {"category": $CAT, "threshold": $T}
      - metavariable-regex:
          metavariable: $T
          regex: "(?i)(BLOCK_NONE|OFF|0|block_none)"
    message: >
      Gemini safety setting threshold set to BLOCK_NONE. This disables
      content filtering for this safety category. Review whether this is
      intentional and document the business justification.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-guardrails-disabled
      whitney_severity: medium
      cwe: ["CWE-20"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [google-ai]
      references:
        - https://ai.google.dev/gemini-api/docs/safety-settings
      soc2_controls: ["CC7.2"]
      remediation: >
        Avoid BLOCK_NONE unless there is a documented business
        justification. Use BLOCK_MEDIUM_AND_ABOVE or BLOCK_LOW_AND_ABOVE
        for production applications.

  # --- Empty safety settings list ---
  - id: code-guardrails-disabled-empty-safety
    patterns:
      - pattern-either:
          - pattern: $MODEL.generate_content(..., safety_settings=[], ...)
          - pattern: genai.GenerativeModel(..., safety_settings=[], ...)
    message: >
      Gemini model configured with empty safety_settings list. This
      disables all content safety filters.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-guardrails-disabled
      whitney_severity: medium
      cwe: ["CWE-20"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [google-ai]
      references:
        - https://ai.google.dev/gemini-api/docs/safety-settings
      soc2_controls: ["CC7.2"]
      remediation: >
        Do not pass an empty safety_settings list. Configure appropriate
        safety thresholds for each category.

  # --- Dangerous content allowed in LangChain ---
  - id: code-guardrails-disabled-langchain-allow-dangerous
    patterns:
      - pattern-either:
          - pattern: $LOADER(..., allow_dangerous_deserialization=True, ...)
          - pattern: $LOADER(..., allow_dangerous_requests=True, ...)
    message: >
      LangChain safety guardrail explicitly bypassed. allow_dangerous_*
      flags disable built-in protections against deserialization attacks
      or unsafe network requests.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-guardrails-disabled
      whitney_severity: high
      cwe: ["CWE-502"]
      owasp: ["LLM05:2025"]
      confidence: HIGH
      category: security
      technology: [langchain]
      references:
        - https://python.langchain.com/docs/security/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Avoid allow_dangerous_deserialization=True and
        allow_dangerous_requests=True in production. Use safe
        serialization formats and validated URLs instead.
