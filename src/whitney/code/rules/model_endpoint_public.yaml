rules:
  - id: code-model-endpoint-public
    patterns:
      - pattern-either:
          - pattern: |
              @app.post(...)
              def $FUNC(...):
                  ...
                  $MODEL.predict(...)
          - pattern: |
              @app.post(...)
              def $FUNC(...):
                  ...
                  $CLIENT.chat.completions.create(...)
          - pattern: |
              @app.post(...)
              async def $FUNC(...):
                  ...
                  $CLIENT.chat.completions.create(...)
          - pattern: |
              @app.post(...)
              async def $FUNC(...):
                  ...
                  $CLIENT.messages.create(...)
          - pattern: |
              @app.route(...)
              def $FUNC(...):
                  ...
                  $MODEL.predict(...)
          - pattern: |
              @app.route(...)
              def $FUNC(...):
                  ...
                  $CLIENT.chat.completions.create(...)
      - pattern-not-inside: |
          @login_required
          ...
      - pattern-not-inside: |
          @require_auth
          ...
      - pattern-not-inside: |
          @jwt_required(...)
          ...
      - pattern-not-inside: |
          @auth_required
          ...
      - pattern-not: |
          @app.post(...)
          async def $FUNC(..., $AUTH = Depends(...), ...):
              ...
    message: >
      Model inference endpoint may lack authentication. Verify that auth
      middleware or decorators protect this AI model endpoint.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-model-endpoint-public
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC6.2"]
      cwe: ["CWE-306"]
      owasp: ["LLM06:2025"]
      confidence: LOW
      category: security
      technology: [flask, fastapi]
      references: ["https://cwe.mitre.org/data/definitions/306.html"]
      remediation: "Add authentication middleware or decorators to AI model endpoints."
