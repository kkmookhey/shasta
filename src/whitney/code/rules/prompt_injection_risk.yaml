rules:
  # --- OpenAI SDK: f-string in messages content ---
  - id: code-prompt-injection-risk-openai
    patterns:
      - pattern: |
          $CLIENT.chat.completions.create(..., messages=[..., {..., "content": f"...{$INPUT}..."}, ...], ...)
    message: >
      User input interpolated into an OpenAI chat completion prompt via f-string.
      This enables prompt injection attacks.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-prompt-injection-risk
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Sanitise user input before including in prompts. Use structured message APIs rather than string interpolation."

  # --- Anthropic SDK: f-string in messages content ---
  - id: code-prompt-injection-risk-anthropic
    patterns:
      - pattern: |
          $CLIENT.messages.create(..., messages=[..., {..., "content": f"...{$INPUT}..."}, ...], ...)
    message: >
      User input interpolated into an Anthropic messages prompt via f-string.
      This enables prompt injection attacks.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-prompt-injection-risk
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Sanitise user input before including in prompts. Use structured message APIs."

  # --- LangChain: user input in prompt template ---
  - id: code-prompt-injection-risk-langchain-fstring
    patterns:
      - pattern-either:
          - pattern: ChatPromptTemplate.from_messages([..., ("human", f"...{$INPUT}..."), ...])
          - pattern: HumanMessage(content=f"...{$INPUT}...")
          - pattern: SystemMessage(content=f"...{$INPUT}...")
    message: >
      User input interpolated into a LangChain prompt template via f-string.
      Use LangChain's input variables instead of direct string interpolation.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-prompt-injection-risk
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Use LangChain input variables ({variable}) instead of f-string interpolation in prompt templates."

  # --- Generic: f-string with user input variable in message dict ---
  - id: code-prompt-injection-risk-fstring-in-dict
    pattern-regex: '"content"\s*:\s*f"[^"]*\{(?:request|req|user_msg|user_message|user_input|message|msg|input|query|question|prompt)'
    message: >
      User input variable appears to be interpolated into an AI prompt
      content field via f-string. This enables prompt injection attacks.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-prompt-injection-risk
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Sanitise user input before including in prompts. Use structured message APIs."

  # --- Generic: .format() with user input in message dict ---
  - id: code-prompt-injection-risk-format-in-dict
    pattern-regex: '"content"\s*:\s*"[^"]*\{[^}]*\}"\.format\s*\((?:request|req|user|input|query|msg)'
    message: >
      User input variable appears to be interpolated into an AI prompt
      content field via .format(). This enables prompt injection attacks.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-prompt-injection-risk
      whitney_severity: high
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: "Sanitise user input before including in prompts. Use parameterised APIs."
