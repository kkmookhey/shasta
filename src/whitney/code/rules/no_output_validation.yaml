rules:
  # --- OpenAI response returned without validation ---
  - id: code-no-output-validation-openai
    patterns:
      - pattern-either:
          - pattern: return response.choices[0].message.content
          - pattern: return completion.choices[0].message.content
          - pattern: |
              $OUTPUT = response.choices[0].message.content
              ...
              return $OUTPUT
      - pattern-not-inside: |
          $VALIDATED = sanitize(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = validate(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = json.loads(...)
          ...
      - pattern-not-inside: |
          ... if ... else ...
      - pattern-not-inside: |
          $VALIDATED = $MODEL.model_validate_json(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = $MODEL.model_validate(...)
          ...
      - pattern-not-inside: |
          ... = re.match(...)
          ...
      - pattern-not-inside: |
          ... = re.search(...)
          ...
    message: >
      OpenAI response content is returned without validation or sanitization.
      Validate and sanitize LLM outputs before use.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-no-output-validation
      whitney_severity: high
      soc2_controls: ["CC7.2"]
      cwe: ["CWE-20"]
      owasp: ["LLM02:2025"]
      confidence: MEDIUM
      category: security
      technology: [openai]
      references: ["https://owasp.org/www-project-top-10-for-large-language-model-applications/"]
      remediation: "Validate and sanitise LLM outputs before using them. Parse structured responses with Pydantic or JSON schema."

  # --- Anthropic response returned without validation ---
  - id: code-no-output-validation-anthropic
    patterns:
      - pattern-either:
          - pattern: return response.content[0].text
          - pattern: return $MSG.content[0].text
          - pattern: |
              $OUTPUT = response.content[0].text
              ...
              return $OUTPUT
      - pattern-not-inside: |
          $VALIDATED = sanitize(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = validate(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = json.loads(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = $MODEL.model_validate_json(...)
          ...
      - pattern-not-inside: |
          $VALIDATED = $MODEL.model_validate(...)
          ...
      - pattern-not-inside: |
          ... = re.match(...)
          ...
      - pattern-not-inside: |
          ... = re.search(...)
          ...
    message: >
      Anthropic response content is returned without validation or
      sanitization. Validate and sanitize LLM outputs before use.
    severity: WARNING
    languages: [python]
    metadata:
      check_id: code-no-output-validation
      whitney_severity: high
      soc2_controls: ["CC7.2"]
      cwe: ["CWE-20"]
      owasp: ["LLM02:2025"]
      confidence: MEDIUM
      category: security
      technology: [anthropic]
      references: ["https://owasp.org/www-project-top-10-for-large-language-model-applications/"]
      remediation: "Validate and sanitise Anthropic LLM outputs before using them. Parse structured responses with Pydantic or JSON schema."
