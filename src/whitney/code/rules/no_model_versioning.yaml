rules:
  - id: code-no-model-versioning
    pattern-regex: model\s*=\s*["'](?:gpt-4|gpt-3\.5-turbo|gpt-4-turbo|gpt-4o|gpt-4o-mini|gpt-4\.1|gpt-4\.1-mini|gpt-4\.1-nano|o1|o1-mini|o1-pro|o3|o3-mini|o3-pro|o4-mini|claude-3-opus|claude-3-sonnet|claude-3-haiku|claude-3\.5-sonnet|claude-3\.5-haiku|claude-sonnet-4|claude-opus-4|gemini-pro|gemini-1\.5-pro|gemini-1\.5-flash|gemini-2\.0-flash|mistral-large|mistral-small|mistral-medium|command-r|command-r-plus)["']
    message: >
      AI model version is not pinned. Using generic model names means the
      model can change without notice, affecting reproducibility.
      Pin with a date suffix (e.g., 'gpt-4-0613').
    severity: INFO
    languages: [python, javascript, typescript]
    metadata:
      check_id: code-no-model-versioning
      whitney_severity: low
      soc2_controls: ["CC8.1"]
      cwe: ["CWE-1188"]
      owasp: []
      confidence: HIGH
      category: best-practice
      technology: [openai, anthropic, google-ai, mistral, cohere]
      references: ["https://platform.openai.com/docs/models"]
      remediation: "Pin model versions with date suffixes (e.g., gpt-4-0613) for reproducibility."
