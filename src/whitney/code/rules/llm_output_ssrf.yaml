rules:
  # ===================================================================
  # LLM output → HTTP requests (SSRF via insecure output handling)
  # ===================================================================
  # Detects patterns where LLM-generated content is used as a URL in
  # HTTP requests. An attacker who controls LLM output via prompt
  # injection can make the server access internal resources (SSRF).

  # --- OpenAI response → requests ---
  - id: code-llm-output-ssrf-openai
    patterns:
      - pattern-either:
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              requests.get($URL, ...)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              requests.post($URL, ...)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              requests.get($URL)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              requests.post($URL)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              httpx.get($URL, ...)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              httpx.post($URL, ...)
          - pattern: |
              $URL = $RESP.choices[0].message.content
              ...
              urllib.request.urlopen($URL)
          - pattern: requests.get($RESP.choices[0].message.content, ...)
          - pattern: requests.get($RESP.choices[0].message.content)
          - pattern: requests.post($RESP.choices[0].message.content, ...)
    message: >
      OpenAI response content is used as a URL in an HTTP request.
      An attacker who achieves prompt injection can cause server-side
      request forgery (SSRF) to access internal services.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-llm-output-ssrf
      whitney_severity: high
      cwe: ["CWE-918"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [openai, requests]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
        - https://cwe.mitre.org/data/definitions/918.html
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Never use LLM output directly as a URL. Validate URLs against
        an allowlist of permitted domains. Block private IP ranges
        (10.x, 172.16-31.x, 192.168.x, 169.254.x, localhost).

  # --- Anthropic response → requests ---
  - id: code-llm-output-ssrf-anthropic
    patterns:
      - pattern-either:
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              requests.get($URL, ...)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              requests.post($URL, ...)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              requests.get($URL)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              requests.post($URL)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              httpx.get($URL, ...)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              httpx.post($URL, ...)
          - pattern: |
              $URL = $RESP.content[0].text
              ...
              urllib.request.urlopen($URL)
          - pattern: requests.get($RESP.content[0].text, ...)
          - pattern: requests.get($RESP.content[0].text)
    message: >
      Anthropic response content is used as a URL in an HTTP request.
      This enables SSRF if prompt injection controls the output.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-llm-output-ssrf
      whitney_severity: high
      cwe: ["CWE-918"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [anthropic, requests]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
        - https://cwe.mitre.org/data/definitions/918.html
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Never use LLM output directly as a URL. Validate against an
        allowlist of permitted domains and block private IP ranges.

  # --- Generic: requests with LLM-output-named variable ---
  - id: code-llm-output-ssrf-generic
    pattern-regex: "requests\\.(?:get|post|put|delete|patch)\\s*\\(\\s*(?:llm_url|generated_url|ai_url|model_url|response_url|output_url)"
    message: >
      HTTP request made with a variable whose name suggests LLM-generated content.
      Verify this URL is validated against an allowlist before use.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-llm-output-ssrf
      whitney_severity: medium
      cwe: ["CWE-918"]
      owasp: ["LLM02:2025"]
      confidence: LOW
      category: security
      technology: [generic, requests]
      references:
        - https://cwe.mitre.org/data/definitions/918.html
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Validate LLM-generated URLs against an allowlist. Block private
        IP ranges and non-HTTP(S) schemes.
